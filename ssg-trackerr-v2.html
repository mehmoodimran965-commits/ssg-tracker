<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSG Tracker — Operation Excellence</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181d23;
    --border: #1e2530;
    --accent: #c8a84b;
    --accent2: #e8c96b;
    --red: #e05252;
    --green: #4caf7d;
    --blue: #4a90d9;
    --text: #e8e8e8;
    --muted: #5a6475;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,168,75,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,168,75,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── AUTH SCREEN ── */
  #authScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
  }
  .auth-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .auth-logo span { color: var(--text); }
  .auth-sub { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
  .auth-tab {
    flex: 1; padding: 10px; text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; background: transparent; border: none; color: var(--muted);
    transition: all 0.2s;
  }
  .auth-tab.active { background: var(--accent); color: #000; }
  .auth-field { margin-bottom: 16px; }
  .auth-field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .auth-field input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 12px 14px; border-radius: 5px;
    font-family: 'Barlow', sans-serif; font-size: 14px;
    outline: none; transition: border 0.2s;
  }
  .auth-field input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%; padding: 14px; background: var(--accent); border: none;
    color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    letter-spacing: 3px; cursor: pointer; border-radius: 5px;
    transition: all 0.2s; margin-top: 8px;
  }
  .auth-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .auth-error { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
  .auth-loading { color: var(--muted); font-size: 12px; margin-top: 10px; text-align: center; }

  /* ── APP ── */
  #appScreen { display: none; position: relative; z-index: 1; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    position: sticky; top: 0;
    background: rgba(10,12,15,0.97);
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: var(--accent); line-height: 1; }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .points-display {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 4px;
  }
  .points-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); letter-spacing: 1px; }
  .points-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .rank-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 4px; border: 1px solid;
    font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s;
  }
  .signout-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 7px 12px; border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s;
  }
  .signout-btn:hover { border-color: var(--red); color: var(--red); }

  .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

  .date-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .date-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 14px; cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
    letter-spacing: 1px; text-transform: uppercase; border-radius: 3px; transition: all 0.2s;
  }
  .date-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-main { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; text-align: center; }
  .date-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 12px 14px; text-align: center; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--accent); letter-spacing: 1px; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

  .day-progress { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .progress-pct { color: var(--accent); font-weight: 700; }
  .progress-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.5s ease; }

  .quote-bar { padding: 10px 0; font-size: 11px; color: var(--muted); font-style: italic; text-align: center; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); }

  .sections { padding: 16px 0 60px; display: flex; flex-direction: column; gap: 14px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); transition: background 0.2s; }
  .section-header:hover { background: var(--surface2); }
  .section-title { display: flex; align-items: center; gap: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .section-meta { display: flex; align-items: center; gap: 10px; }
  .section-pts { font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .section-toggle { font-size: 11px; color: var(--muted); transition: transform 0.3s; }
  .section.open .section-toggle { transform: rotate(180deg); }
  .section-body { display: none; padding: 4px 0; }
  .section.open .section-body { display: block; }

  .task { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid rgba(30,37,48,0.5); cursor: pointer; transition: background 0.15s; }
  .task:last-child { border-bottom: none; }
  .task:hover { background: rgba(200,168,75,0.04); }
  .task.done { opacity: 0.5; }
  .task.done .task-name { text-decoration: line-through; }
  .checkbox { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 11px; }
  .task.done .checkbox { background: var(--green); border-color: var(--green); }
  .task-info { flex: 1; }
  .task-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .task-time { font-size: 11px; color: var(--muted); }
  .task-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--accent); flex-shrink: 0; }

  .rewards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; padding: 14px; }
  .reward-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; text-align: center; transition: all 0.3s; position: relative; overflow: hidden; }
  .reward-card.unlocked { border-color: var(--accent); background: rgba(200,168,75,0.05); }
  .reward-card.unlocked::before { content: '✓'; position: absolute; top: 8px; right: 10px; font-size: 12px; color: var(--green); font-weight: 700; }
  .reward-icon { font-size: 28px; margin-bottom: 6px; }
  .reward-name { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .reward-desc { font-size: 10px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
  .reward-cost { display: inline-flex; align-items: center; gap: 3px; background: var(--surface); padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: 700; color: var(--accent); }

  .streak-bar { display: flex; gap: 5px; padding: 14px 16px; flex-wrap: wrap; }
  .streak-day { width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; transition: all 0.3s; }
  .streak-day.completed { background: var(--accent); border-color: var(--accent2); color: #000; }
  .streak-day.today { border-color: var(--accent); color: var(--accent); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--accent); border-radius: 6px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; z-index: 999; transform: translateX(200px); opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); max-width: 300px; }
  .toast.show { transform: translateX(0); opacity: 1; }
  .toast-icon { font-size: 20px; }
  .toast-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .toast-msg { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 16px; }
  .loading-logo { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 4px; color: var(--accent); }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dots span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  @media(max-width:600px) {
    .rewards-grid { grid-template-columns: 1fr 1fr; }
    .header-inner { gap: 8px; }
  }
</style>
</head>

<!-- AUTH SCREEN -->

</div>

<!-- APP SCREEN -->

  </header>

  <div class="container">
    <div class="date-nav">

      <div>
        <div class="date-main" id="dateMain">TODAY</div>
        <div class="date-sub" id="dateSub"></div>
      </div>
      <button class="date-btn" onclick="changeDay(1)">NEXT ▶</button>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" id="streakVal">0</div><div class="stat-label">🔥 Streak</div></div>
      <div class="stat-card"><div class="stat-val" id="todayPts">0</div><div class="stat-label">⭐ Today</div></div>
      <div class="stat-card"><div class="stat-val" id="completedVal">0%</div><div class="stat-label">✅ Done</div></div>
    </div>

    <div class="day-progress">
      <div class="progress-header"><span>Daily Mission Progress</span><span class="progress-pct" id="progressPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="quote-bar" id="quoteBar"></div>

    <div class="sections" id="sectionsContainer"></div>

    <!-- REWARDS -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title"><span>🏆</span> Rewards & Ranks</div>
        <div class="section-meta"><span class="section-toggle">▼</span></div>
      </div>
      <div class="section-body" style="display:block;">
        <div class="rewards-grid" id="rewardsGrid"></div>
      </div>
    </div>

    <!-- STREAK CALENDAR -->
    <div class="section" style="margin-top:0; margin-bottom: 60px;">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title"><span>📅</span> 30-Day Streak</div>
        <div class="section-meta"><span class="section-toggle">▼</span></div>
      </div>
      <div class="section-body" style="display:block;">
        <div class="streak-bar" id="streakCalendar"></div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon"></div>
  <div><div class="toast-title" id="toastTitle"></div><div class="toast-msg" id="toastMsg"></div></div>
</div>

function dateKey(d) { return d.toISOString().split('T')[0]; }

// ── AUTH ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='signup')));
  document.getElementById('loginForm').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('authError').textContent = '';
}

async function handleSignup() {
  const username = document.getElementById('signupUsername').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!username || !email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  errEl.textContent = ''; errEl.style.color = 'var(--muted)';
  errEl.textContent = 'Creating account...';
  const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } });
  if (error) { errEl.style.color = 'var(--red)'; errEl.textContent = error.message; return; }
  errEl.style.color = 'var(--green)';
  errEl.textContent = 'Account created! You are now logged in.';
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = ''; errEl.style.color = 'var(--muted)';
  errEl.textContent = 'Logging in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.style.color = 'var(--red)'; errEl.textContent = error.message; return; }
}

async function handleSignOut() {
  await sb.auth.signOut();
  currentUser = null; dayCache = {}; totalPoints = 0;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

// ── DATA ──
async function loadUserData() {
  const { data, error } = await sb.from('task_logs').select('*').eq('user_id', currentUser.id);
  if (error) { console.error(error); return; }
  dayCache = {};
  totalPoints = 0;
  (data || []).forEach(row => {
    if (!dayCache[row.date]) dayCache[row.date] = { tasks: {}, pts: 0 };
    dayCache[row.date].tasks[row.task_id] = true;
    const task = TASKS.find(t => t.id === row.task_id);
    if (task) {
      dayCache[row.date].pts = (dayCache[row.date].pts || 0) + task.pts;
      totalPoints += task.pts;
    }
  });
}

async function toggleTask(taskId) {
  const task = TASKS.find(t => t.id === taskId);
  if (!task) return;
  if (!dayCache[currentDate]) dayCache[currentDate] = { tasks: {}, pts: 0 };
  const wasDone = !!dayCache[currentDate].tasks[taskId];

  if (wasDone) {
    // Delete from DB
    await sb.from('task_logs').delete()
      .eq('user_id', currentUser.id).eq('date', currentDate).eq('task_id', taskId);
    dayCache[currentDate].tasks[taskId] = false;
    dayCache[currentDate].pts -= task.pts;
    totalPoints = Math.max(0, totalPoints - task.pts);
  } else {
    // Insert to DB
    await sb.from('task_logs').insert({ user_id: currentUser.id, date: currentDate, task_id: taskId });
    dayCache[currentDate].tasks[taskId] = true;
    dayCache[currentDate].pts = (dayCache[currentDate].pts || 0) + task.pts;
    totalPoints += task.pts;
    checkRankUp(task.pts);
    showToast('⭐', `+${task.pts} Points`, task.name);
  }
  render();
}

function checkRankUp(addedPts) {
  REWARDS.forEach(r => {
    if (r.cost > 0 && totalPoints >= r.cost && (totalPoints - addedPts) < r.cost) {
      setTimeout(() => showToast(r.icon, 'RANK UP!', `You are now: ${r.name}`), 800);
    }
  });
}

// ── RENDER ──
function render() {
  renderDate();
  renderSections();
  renderStats();
  renderRewards();
  renderStreak();
  renderQuote();
}

function renderDate() {
  const d = new Date(currentDate + 'T12:00:00');
  const today = dateKey(new Date());
  document.getElementById('dateMain').textContent = currentDate === today ? 'TODAY' :
    d.toLocaleDateString('en-PK', { weekday:'long', day:'numeric', month:'short' }).toUpperCase();
  document.getElementById('dateSub').textContent =
    d.toLocaleDateString('en-PK', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function renderSections() {
  const container = document.getElementById('sectionsContainer');
  const day = dayCache[currentDate] || { tasks: {}, pts: 0 };
  const grouped = {};
  TASKS.forEach(t => { if (!grouped[t.section]) grouped[t.section] = []; grouped[t.section].push(t); });
  container.innerHTML = '';
  Object.entries(grouped).forEach(([secKey, tasks]) => {
    const meta = SECTIONS_META[secKey];
    const secPts = tasks.reduce((s,t) => s + (day.tasks[t.id] ? t.pts : 0), 0);
    const totalSecPts = tasks.reduce((s,t) => s + t.pts, 0);
    const sec = document.createElement('div');
    sec.className = 'section open';
    sec.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title" style="color:${meta.color}">${meta.icon} ${meta.label}</div>
        <div class="section-meta">
          <span class="section-pts">${secPts}/${totalSecPts} pts</span>
          <span class="section-toggle">▼</span>
        </div>
      </div>
      <div class="section-body" style="display:block;">
        ${tasks.map(t => `
          <div class="task ${day.tasks[t.id] ? 'done' : ''}" onclick="toggleTask('${t.id}')">
            <div class="checkbox">${day.tasks[t.id] ? '✓' : ''}</div>
            <div class="task-info">
              <div class="task-name">${t.name}</div>
              <div class="task-time">🕐 ${t.time}</div>
            </div>
            <div class="task-pts">+${t.pts}</div>
          </div>`).join('')}
      </div>`;
    container.appendChild(sec);
  });
}

function renderStats() {
  const day = dayCache[currentDate] || { tasks:{}, pts:0 };
  const done = TASKS.filter(t => day.tasks[t.id]).length;
  const pct = Math.round((done / TASKS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('completedVal').textContent = pct + '%';
  document.getElementById('todayPts').textContent = day.pts || 0;
  document.getElementById('totalPoints').textContent = totalPoints;
  document.getElementById('streakVal').textContent = calcStreak();
  const rank = getCurrentRank();
  const badge = document.getElementById('rankBadge');
  badge.textContent = rank.icon + ' ' + rank.name;
  const rc = getRankColor(rank.cost);
  badge.style.borderColor = rc; badge.style.color = rc; badge.style.background = rc + '18';
}

function getRankColor(cost) {
  if (cost >= 5000) return '#00d4ff';
  if (cost >= 3500) return '#ffd700';
  if (cost >= 2000) return '#a8a9ad';
  if (cost >= 1000) return '#cd7f32';
  return '#c8a84b';
}

function getCurrentRank() {
  let rank = REWARDS[0];
  REWARDS.forEach(r => { if (totalPoints >= r.cost) rank = r; });
  return rank;
}

function renderRewards() {
  document.getElementById('rewardsGrid').innerHTML = REWARDS.map(r => `
    <div class="reward-card ${totalPoints >= r.cost ? 'unlocked' : ''}">
      <div class="reward-icon">${r.icon}</div>
      <div class="reward-name">${r.name}</div>
      <div class="reward-desc">${r.desc}</div>
      <div class="reward-cost">⭐ ${r.cost === 0 ? 'START' : r.cost + ' pts'}</div>
    </div>`).join('');
}

function renderStreak() {
  const today = dateKey(new Date());
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(dateKey(d));
  }
  document.getElementById('streakCalendar').innerHTML = days.map(dk => {
    const day = dayCache[dk];
    const done = day ? TASKS.filter(t => day.tasks[t.id]).length : 0;
    const pct = Math.round((done / TASKS.length) * 100);
    const label = new Date(dk + 'T12:00:00').getDate();
    return `<div class="streak-day ${pct>=70?'completed':''} ${dk===today?'today':''}" title="${dk} — ${pct}% done">${label}</div>`;
  }).join('');
}

function renderQuote() {
  document.getElementById('quoteBar').textContent =
    '"' + QUOTES[Math.floor(Math.random() * QUOTES.length)] + '"';
}

function calcStreak() {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = dateKey(d);
    const day = dayCache[key];
    if (!day) break;
    const done = TASKS.filter(t => day.tasks[t.id]).length;
    if ((done / TASKS.length) < 0.7) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function changeDay(dir) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + dir);
  const today = new Date(); today.setHours(12,0,0,0);
  if (d > today) return;
  currentDate = dateKey(d);
  render();
}

function toggleSection(header) {
  const section = header.closest('.section');
  section.classList.toggle('open');
  section.querySelector('.section-body').style.display =
    section.classList.contains('open') ? 'block' : 'none';
}

// ── TOAST ──
let toastTimer;
function showToast(icon, title, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById('loadingOverlay').style.display = 'none';
  if (session) {
    currentUser = session.user;
    await loadUserData();
    document.getElementById('appScreen').style.display = 'block';
    render();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('loadingOverlay').style.display = 'flex';
      await loadUserData();
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      render();
    } else if (event === 'SIGNED_OUT') {
      document.getElementById('appScreen').style.display = 'none';
      document.getElementById('authScreen').style.display = 'flex';
    }
  });
}

init();
</script>
</body>
</html>
